name: C1Bridge
options:
  bundleIdPrefix: ai.reachhigher
  deploymentTarget:
    iOS: "17.0"
settings:
  SWIFT_VERSION: "5.0"
targets:
  C1Bridge:
    type: application
    platform: iOS
    settings:
      base:
        DEVELOPMENT_TEAM: "XB8JG6VJUS"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: ai.reachhigher.C1Bridge
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "6"
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    sources:
      - path: C1Bridge
        exclude:
          - "*.plist"
          - "*.png"
          - "*.pdf"
          - "*.csv"
          - "*.bak-*"
          - "Can you undo*"
          - "Item.swift"
    info:
      path: C1Bridge/Info.plist
      properties:
        UIRequiredDeviceCapabilities:
          - bluetooth-le
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSBluetoothAlwaysUsageDescription: C1 MIDI Bridge uses Bluetooth to connect to your C1 guitar.
        NSBluetoothPeripheralUsageDescription: C1 MIDI Bridge uses Bluetooth to connect to your C1 guitar.
        UIBackgroundModes:
          - bluetooth-central
          - audio
          - fetch
        CFBundleDisplayName: C1 MIDI Bridge
